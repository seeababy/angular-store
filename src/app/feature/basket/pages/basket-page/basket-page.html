<section class="basket container">
  @if (totalCount() > 0) {
  <div class="basket-header">
    <button class="clear-btn" (click)="clearCart()">
      <mat-icon svgIcon="delete"></mat-icon>
    </button>
  </div>
  } @if (totalCount() === 0) {
  <div class="basket-empty">
    <img src="/assets/images/basket/empty-basket.jpg" alt="Empty basket" />
    <p>Кошик порожній</p>
  </div>
  } @else {

  <app-basket-card />

  <div class="basket-footer">
    <button class="continue-btn" [routerLink]="['/', AppRoutesConfig.Home]">Продовжити покупки</button>

    <div class="summary">
      <div class="total">
        <span>{{ total() }} ₴</span>
      </div>

      <button class="checkout-btn" [routerLink]="['/', AppRoutesConfig.MakeOrder]">Оформити замовлення</button>
    </div>
  </div>
  }
</section>
