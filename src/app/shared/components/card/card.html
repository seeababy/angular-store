<div class="card">
    <img [src]="product()?.image" alt="product" class="card__image" />

    <a class="card__title">{{ product()?.title }}</a>

    <div class="card__bottom">
        <span class="card__price">{{ product()?.price }} ₴</span>

        @if (!isInBasket()) {
        <button class="card__cart" (click)="onAdd()">
            <mat-icon class="icon" svgIcon="cart"></mat-icon>
        </button>
        } @else {
        <button class="card__cart" (click)="goToBasket()">
            <mat-icon class="icon" svgIcon="cart-checkout"></mat-icon>
        </button>
        }

    </div>
</div>
