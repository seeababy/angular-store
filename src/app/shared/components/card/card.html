<div class="card" (click)="goToProductPage()">
    <div class="image-wrapper">
        @if (product()?.images?.length) {
            <img [src]="cdnUrl + product().images[0]" alt="product" class="card__image" />
        }
    </div>

    <a class="card__title">{{ product()?.name }}</a>

    <div class="card__bottom">
        <span class="card__price">{{ product()?.price }} ₴</span>

        @if (!isInBasket()) {
        <button class="card__cart" (click)="$event.stopPropagation(); onAdd()">
            <mat-icon class="icon" svgIcon="cart"></mat-icon>
        </button>
        } @else {
        <button class="card__cart" (click)="$event.stopPropagation(); goToBasket()">
            <mat-icon class="icon" svgIcon="cart-checkout"></mat-icon>
        </button>
        }

    </div>
</div>
